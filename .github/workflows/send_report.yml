name: Send Hevy Report Email

on:
  push:
    branches: [main]
    paths:
      - 'hevy_report_*.pdf'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send email with attachments
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, ssl, glob, os, datetime
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders

          def latest(pattern):
              files = sorted(glob.glob(pattern), reverse=True)
              return files[0] if files else None

          log_path     = latest("*_hevylog.txt")
          pdf_path     = latest("hevy_report_*.pdf")
          summary_path = latest("summary_*.txt")

          if not pdf_path:
              print("No PDF found — skipping email.")
              exit(0)

          body = open(summary_path).read() if summary_path else "(See attachments for full report.)"

          sender   = os.environ["GMAIL_ADDRESS"]
          password = os.environ["GMAIL_APP_PASSWORD"]
          today    = datetime.date.today()

          msg = MIMEMultipart()
          msg["Subject"] = f"Hevy 30-Day Report — {today}"
          msg["From"]    = sender
          msg["To"]      = sender
          msg.attach(MIMEText(body, "plain"))

          def attach(path):
              with open(path, "rb") as f:
                  part = MIMEBase("application", "octet-stream")
                  part.set_payload(f.read())
              encoders.encode_base64(part)
              part.add_header("Content-Disposition", f'attachment; filename="{os.path.basename(path)}"')
              msg.attach(part)

          if log_path:
              attach(log_path)
          attach(pdf_path)

          with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=ssl.create_default_context()) as s:
              s.login(sender, password)
              s.send_message(msg)

          print(f"Sent to {sender}: body from {summary_path}, attachments: {os.path.basename(log_path or '')}, {os.path.basename(pdf_path)}")
          PYEOF
